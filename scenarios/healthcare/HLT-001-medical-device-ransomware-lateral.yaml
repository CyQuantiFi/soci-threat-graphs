id: HLT-001
title: Hospital ransomware with lateral movement to medical-device subnets
version: 1.0.0
sector: healthcare
soci_asset_class: health_care_and_medical
classification: TLP:CLEAR

summary: >
  An attacker delivers ransomware into a hospital's enterprise IT environment
  and moves laterally onto biomedical-engineering and medical-device subnets,
  where unsupported legacy operating systems and IoT-class imaging devices
  cannot be patched or run modern agents. Loss of imaging, electronic medical
  records, and pathology systems forces re-routing of patients and cancellation
  of elective procedures. Pattern documented in numerous AU and international
  healthcare incidents 2020-2025.

mitre_attack:
  tactics: [TA0001, TA0008, TA0040]
  techniques:
    - id: T1566
      name: Phishing
    - id: T1021
      name: Remote Services
    - id: T1486
      name: Data Encrypted for Impact

nodes:
  - id: external_attacker
    type: external
    description: Ransomware-as-a-service operator
    scannable: true
    criticality: low

  - id: clinician_workstation
    type: it_asset
    description: Clinician endpoint with email and EMR access
    scannable: true
    criticality: medium

  - id: emr_system
    type: it_asset
    description: Electronic Medical Records system
    scannable: true
    criticality: critical
    consequence_type: availability

  - id: imaging_modality_ct
    type: iot_asset
    description: CT scanner with embedded Windows OS that vendor will not allow patching outside scheduled service windows
    scannable: false
    reason_unscannable: vendor_support_prohibits_agents
    criticality: high
    consequence_type: availability

  - id: pathology_lis
    type: it_asset
    description: Laboratory Information System for pathology
    scannable: true
    criticality: critical
    consequence_type: availability

  - id: legacy_radiology_pacs
    type: it_asset
    description: Picture Archiving and Communication System running unsupported OS
    scannable: false
    reason_unscannable: legacy_unsupported_os
    criticality: high
    consequence_type: availability

edges:
  - from: external_attacker
    to: clinician_workstation
    technique: T1566
    detection_difficulty: medium
    notes: Phishing with malicious document; common entry vector in disclosed healthcare incidents

  - from: clinician_workstation
    to: emr_system
    technique: T1021
    detection_difficulty: high
    notes: Stolen clinician credentials used over RDP or SMB

  - from: emr_system
    to: imaging_modality_ct
    technique: T1486
    detection_difficulty: very_high
    notes: Flat-network or weakly-segmented biomedical VLAN allows ransomware to reach the modality

  - from: emr_system
    to: pathology_lis
    technique: T1486
    detection_difficulty: low

  - from: emr_system
    to: legacy_radiology_pacs
    technique: T1486
    detection_difficulty: low

likelihood:
  annual_frequency:
    min: 0.03
    mode: 0.12
    max: 0.40
  rationale: >
    Healthcare is the most frequently targeted critical-infrastructure sector
    in AU per OAIC NDB statistics 2022-2025. Mode reflects the high observed
    base rate; max reflects the worst-case for a tertiary hospital network
    with weak segmentation between corporate and clinical environments.

loss_magnitude:
  primary_response:
    min: 500000
    mode: 4000000
    max: 25000000
    notes: Incident response, surge clinical staffing, paper-based fallback, vendor coordination on devices
  secondary_response:
    min: 2000000
    mode: 30000000
    max: 300000000
    notes: Cancelled elective procedures, ED diversion, OAIC notifiable data breach, class action exposure, brand damage, possible patient-safety findings
  currency: AUD

controls_suggested:
  - id: PR.AC-5
    name: Network segmentation between corporate and biomedical networks
    framework: NIST-CSF
  - id: E8-BACKUPS
    name: Daily backups with offline copy and tested recovery
    framework: Essential-Eight
  - id: CIRMP-CYBER-8
    name: Compensating controls for unscannable medical devices
    framework: SOCI-CIRMP
  - id: ISO-27001-A.8.13
    name: Information backup
    framework: ISO-27001

references:
  - "OAIC Notifiable Data Breaches reports 2022 H1 through 2025 H2"
  - "ASD/ACSC, Annual Cyber Threat Report 2024-25 — health sector"
  - "Health Sector Cybersecurity Coordination Center (HC3) — international parallels"
  - "Australian Government, Security of Critical Infrastructure Act 2018, health care and medical asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
