id: HLT-007
title: Insider clinician inappropriate access to VIP and family medical records
version: 1.0.0
sector: healthcare
soci_asset_class: health_care_and_medical
classification: TLP:CLEAR

summary: >
  A clinician with legitimate EMR access inappropriately views, copies, or
  discusses the records of high-profile patients (politicians, celebrities,
  former partners, family members) outside of their care responsibilities.
  Pattern is the highest-frequency insider event in healthcare per OAIC
  and AHPRA disciplinary records, and one of the most consistently
  notifiable categories under the Notifiable Data Breaches scheme.

mitre_attack:
  tactics: [TA0009]
  techniques:
    - id: T1078
      name: Valid Accounts
    - id: T1213
      name: Data from Information Repositories

nodes:
  - id: insider_clinician
    type: person
    description: Clinician with legitimate EMR access
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: medium

  - id: emr_system
    type: it_asset
    description: Electronic Medical Records system
    scannable: true
    criticality: critical
    consequence_type: confidentiality

  - id: vip_patient_records
    type: data_store
    description: Records of high-profile or sensitive patients
    scannable: true
    criticality: high
    consequence_type: confidentiality

edges:
  - from: insider_clinician
    to: emr_system
    technique: T1078
    detection_difficulty: very_high
    notes: Legitimate authentication; no anomaly at login

  - from: emr_system
    to: vip_patient_records
    technique: T1213
    detection_difficulty: high
    notes: Access-without-care-relationship pattern detectable on audit log review

likelihood:
  annual_frequency:
    min: 0.10
    mode: 0.40
    max: 0.85
  rationale: >
    Inappropriate-access events are extremely common in EMR audit-log
    reviews per OAIC and AHPRA statistics. Mode reflects the near-certainty
    that at least one event occurs at any large AU hospital per year.

loss_magnitude:
  primary_response:
    min: 50000
    mode: 300000
    max: 2000000
  secondary_response:
    min: 150000
    mode: 2000000
    max: 30000000
    notes: OAIC NDB, AHPRA disciplinary action, patient compensation, brand damage
  currency: AUD

controls_suggested:
  - id: PR.AC-4
    name: Least privilege and break-glass procedures
    framework: NIST-CSF
  - id: CIRMP-PERS-2
    name: Routine EMR access-without-care-relationship auditing
    framework: SOCI-CIRMP
  - id: AESCSF-AC-06
    name: User-activity monitoring on EMR
    framework: AESCSF

references:
  - "OAIC Notifiable Data Breaches reports 2022 H1 through 2025 H2"
  - "AHPRA disciplinary records on EMR misuse"
  - "Privacy Act 1988 (Cth) and Australian Privacy Principles"
  - "RACGP and AMA guidance on appropriate EMR access"
  - "Australian Government, Security of Critical Infrastructure Act 2018, health care and medical asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
