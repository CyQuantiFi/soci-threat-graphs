id: HLT-006
title: Pathology Laboratory Information System ransomware halting diagnostics
version: 1.0.0
sector: healthcare
soci_asset_class: health_care_and_medical
classification: TLP:CLEAR

summary: >
  Ransomware encrypts the Laboratory Information System (LIS) of a major
  pathology provider, suspending result reporting across many hospitals,
  GPs, and outpatient services. Patients cannot be diagnosed or discharged
  in a timely manner, surgery is delayed, and ED throughput suffers.
  Pattern matches multiple AU and international pathology-provider
  ransomware events 2022-2025.

mitre_attack:
  tactics: [TA0001, TA0008, TA0040]
  techniques:
    - id: T1566
      name: Phishing
    - id: T1486
      name: Data Encrypted for Impact
    - id: T1490
      name: Inhibit System Recovery

nodes:
  - id: external_attacker
    type: external
    description: Ransomware affiliate
    scannable: true
    criticality: low

  - id: pathology_user_endpoint
    type: it_asset
    description: Pathology-staff endpoint
    scannable: true
    criticality: medium

  - id: laboratory_information_system
    type: it_asset
    description: Laboratory Information System
    scannable: true
    criticality: critical
    consequence_type: availability

  - id: pathology_analyser_interfaces
    type: ot_asset
    description: Pathology analyser interfaces delivering results to the LIS
    scannable: false
    reason_unscannable: vendor_support_prohibits_agents
    criticality: high

  - id: result_distribution_network
    type: it_asset
    description: Result distribution to hospitals and GPs
    scannable: true
    criticality: critical
    consequence_type: availability

edges:
  - from: external_attacker
    to: pathology_user_endpoint
    technique: T1566
    detection_difficulty: medium

  - from: pathology_user_endpoint
    to: laboratory_information_system
    technique: T1486
    detection_difficulty: low

  - from: laboratory_information_system
    to: pathology_analyser_interfaces
    technique: T1486
    detection_difficulty: low

  - from: laboratory_information_system
    to: result_distribution_network
    technique: T1490
    detection_difficulty: low

likelihood:
  annual_frequency:
    min: 0.03
    mode: 0.15
    max: 0.40
  rationale: >
    Pathology providers are concentration points and have been hit globally.
    Mode reflects the likelihood that at least one AU pathology provider
    experiences a material ransomware event in a 12-month window.

loss_magnitude:
  primary_response:
    min: 1000000
    mode: 6000000
    max: 30000000
  secondary_response:
    min: 3000000
    mode: 60000000
    max: 800000000
    notes: Multi-hospital impact, ED diversion, elective surgery cancellations, possible patient safety events, OAIC NDB, regulator inquiries
  currency: AUD

controls_suggested:
  - id: E8-BACKUPS
    name: Daily backups with offline copy and tested recovery
    framework: Essential-Eight
  - id: PR.AC-5
    name: Segmentation between corporate and laboratory networks
    framework: NIST-CSF
  - id: CIRMP-CYBER-9
    name: Tested business continuity plan including paper-based result distribution
    framework: SOCI-CIRMP

references:
  - "ACSC, Annual Cyber Threat Report 2024-25 — health sector"
  - "OAIC Notifiable Data Breaches reports 2022 H1 through 2025 H2"
  - "RCPA pathology service standards"
  - "HC3 (US HHS) laboratory-sector advisories"
  - "Australian Government, Security of Critical Infrastructure Act 2018, health care and medical asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
