id: AVI-002
title: Airline Departure Control System ransomware halting passenger processing
version: 1.0.0
sector: aviation
soci_asset_class: aviation
classification: TLP:CLEAR

summary: >
  Ransomware encrypts the airline-shared Departure Control System (DCS)
  or common-use passenger-processing platform at an airport (e.g.
  Amadeus Altea, SITA AirportConnect Open), affecting check-in, bag-drop,
  boarding-gate operations across multiple airlines simultaneously.
  Reflects the 2018 Bristow-and-Air-NZ DCS outage pattern and the 2024
  Microsoft / CrowdStrike global ground-stop incident — both of which
  caused mass-cancellation conditions even without targeted attack.

mitre_attack:
  tactics: [TA0001, TA0040]
  techniques:
    - id: T1078
      name: Valid Accounts
    - id: T1486
      name: Data Encrypted for Impact
    - id: T1490
      name: Inhibit System Recovery

nodes:
  - id: external_attacker
    type: external
    description: Ransomware-as-a-service affiliate
    scannable: true
    criticality: low

  - id: dcs_admin_account
    type: it_asset
    description: DCS or common-use platform admin account
    scannable: true
    criticality: critical

  - id: dcs_application_servers
    type: it_asset
    description: DCS application server cluster
    scannable: true
    criticality: critical
    consequence_type: availability

  - id: check_in_kiosk_population
    type: it_asset
    description: Airport-wide population of check-in kiosks and bag-drop terminals
    scannable: true
    criticality: high
    consequence_type: availability

  - id: boarding_gate_workstations
    type: it_asset
    description: Boarding-gate workstations relying on DCS
    scannable: true
    criticality: high
    consequence_type: availability

edges:
  - from: external_attacker
    to: dcs_admin_account
    technique: T1078
    detection_difficulty: high

  - from: dcs_admin_account
    to: dcs_application_servers
    technique: T1486
    detection_difficulty: low

  - from: dcs_application_servers
    to: check_in_kiosk_population
    technique: T1490
    detection_difficulty: low

  - from: dcs_application_servers
    to: boarding_gate_workstations
    technique: T1490
    detection_difficulty: low

likelihood:
  annual_frequency:
    min: 0.005
    mode: 0.04
    max: 0.18
  rationale: >
    DCS and common-use passenger-processing platforms are high-impact
    targets concentrated in a small number of vendors. Mode reflects the
    likelihood that at least one AU airport experiences a major DCS-
    related outage in a 12-month window.

loss_magnitude:
  primary_response:
    min: 2000000
    mode: 10000000
    max: 50000000
  secondary_response:
    min: 5000000
    mode: 80000000
    max: 1000000000
    notes: Multi-airline cancellation costs, ACL compensation, parliamentary scrutiny, airport-charges dispute, brand damage
  currency: AUD

controls_suggested:
  - id: E8-BACKUPS
    name: Daily backups with offline copy and tested recovery
    framework: Essential-Eight
  - id: PR.AC-5
    name: Segmentation of common-use platform from airport corporate network
    framework: NIST-CSF
  - id: CIRMP-CYBER-9
    name: Tested business continuity plan including manual fallback for passenger processing
    framework: SOCI-CIRMP

references:
  - "Microsoft and CrowdStrike global IT outage, July 2024 — airport impact"
  - "IATA Aviation Cyber Security Strategy 2.0"
  - "SITA and Amadeus public security advisories"
  - "ACSC, Annual Cyber Threat Report 2024-25"
  - "Australian Government, Security of Critical Infrastructure Act 2018, aviation asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
