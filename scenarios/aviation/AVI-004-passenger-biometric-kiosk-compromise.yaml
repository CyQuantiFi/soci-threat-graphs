id: AVI-004
title: Passenger biometric and ePassport kiosk compromise leaking PII at scale
version: 1.0.0
sector: aviation
soci_asset_class: aviation
classification: TLP:CLEAR

summary: >
  An attacker compromises the airport's biometric and ePassport processing
  platform — including SmartGate or equivalent kiosks — and exfiltrates
  biometric templates, passport details, and travel history of large
  numbers of passengers over a sustained period. No operational disruption,
  but extreme privacy and national-security consequence. Anchored to
  ongoing concerns at the Department of Home Affairs about biometric
  platform security and to OAIC NDB statistics on PII at airports.

mitre_attack:
  tactics: [TA0001, TA0009]
  techniques:
    - id: T1190
      name: Exploit Public-Facing Application
    - id: T1213
      name: Data from Information Repositories
    - id: T1567
      name: Exfiltration Over Web Service

nodes:
  - id: external_attacker
    type: external
    description: State-aligned actor or capable cyber-criminal
    scannable: true
    criticality: low

  - id: biometric_processing_backend
    type: it_asset
    description: Biometric and ePassport processing backend
    scannable: true
    criticality: critical
    consequence_type: confidentiality

  - id: passenger_biometric_database
    type: data_store
    description: Database of passenger biometric templates and travel history
    scannable: true
    criticality: critical
    consequence_type: confidentiality

  - id: smartgate_kiosk_population
    type: iot_asset
    description: SmartGate or equivalent automated border-control kiosks
    scannable: false
    reason_unscannable: vendor_support_prohibits_agents
    criticality: high

edges:
  - from: external_attacker
    to: biometric_processing_backend
    technique: T1190
    detection_difficulty: high

  - from: biometric_processing_backend
    to: passenger_biometric_database
    technique: T1213
    detection_difficulty: high

  - from: passenger_biometric_database
    to: external_attacker
    technique: T1567
    detection_difficulty: high

likelihood:
  annual_frequency:
    min: 0.0005
    mode: 0.008
    max: 0.04
  rationale: >
    Very low base rate per AU disclosed incidents; state-aligned actor
    targeting of biometric and border systems is consistently noted in
    ASIO and ACSC reports.

loss_magnitude:
  primary_response:
    min: 1500000
    mode: 8000000
    max: 40000000
  secondary_response:
    min: 5000000
    mode: 80000000
    max: 1500000000
    notes: National-security consequences (compromise of biometric templates is irrevocable), OAIC NDB notification at scale, Department of Home Affairs and ASIO investigation
  currency: AUD

controls_suggested:
  - id: PR.DS-1
    name: Data-at-rest protection on biometric databases
    framework: NIST-CSF
  - id: CIRMP-CYBER-3
    name: External attack-surface monitoring and red-team testing
    framework: SOCI-CIRMP
  - id: PR.AC-7
    name: Strong authentication on biometric platform administration
    framework: NIST-CSF

references:
  - "Department of Home Affairs SmartGate and biometric platform publications"
  - "ASIO Director-General's Annual Threat Assessment 2024 and 2025"
  - "OAIC Notifiable Data Breaches reports 2022 H1 through 2025 H2"
  - "ICAO Doc 9303 on Machine Readable Travel Documents"
  - "Australian Government, Security of Critical Infrastructure Act 2018, aviation asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
