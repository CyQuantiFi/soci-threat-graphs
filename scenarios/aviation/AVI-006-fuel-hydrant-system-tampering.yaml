id: AVI-006
title: Aviation fuel hydrant system tampering disrupting refuelling
version: 1.0.0
sector: aviation
soci_asset_class: aviation
classification: TLP:CLEAR

summary: >
  An attacker compromises the aviation-fuel hydrant control system at a
  major airport, either denying fuel to aircraft during turnaround or
  manipulating quantity data to cause weight-and-balance discrepancies.
  Anchored to the 2022 cyber attack on the Mabanaft / Oiltanking fuel
  distribution group in Germany which affected supply to several major
  airports and to general concerns about fuel-supply cyber risk noted by
  IATA.

mitre_attack:
  tactics: [TA0001, TA0040]
  techniques:
    - id: T1190
      name: Exploit Public-Facing Application
    - id: T0836
      name: Modify Parameter
    - id: T0815
      name: Denial of View

nodes:
  - id: external_attacker
    type: external
    description: Adversary targeting fuel-supply infrastructure
    scannable: true
    criticality: low

  - id: fuel_management_system
    type: it_asset
    description: Aviation-fuel hydrant management system
    scannable: true
    criticality: critical
    consequence_type: availability

  - id: hydrant_control_plc
    type: ot_asset
    description: PLC controlling hydrant valves and quantity measurement
    scannable: false
    reason_unscannable: safety_critical_air_gapped
    criticality: critical
    consequence_type: physical_safety

  - id: aircraft_refuelling_operation
    type: ot_asset
    description: Aircraft turnaround refuelling
    scannable: false
    reason_unscannable: operational_disruption_risk
    criticality: critical
    consequence_type: availability

edges:
  - from: external_attacker
    to: fuel_management_system
    technique: T1190
    detection_difficulty: medium

  - from: fuel_management_system
    to: hydrant_control_plc
    technique: T0836
    detection_difficulty: very_high

  - from: hydrant_control_plc
    to: aircraft_refuelling_operation
    technique: T0815
    detection_difficulty: low

likelihood:
  annual_frequency:
    min: 0.001
    mode: 0.012
    max: 0.05
  rationale: >
    Aviation-fuel cyber incidents have clear international precedent.
    Mode reflects the small number of AU airports with hydrant systems
    and the dependence on a concentrated fuel supply chain.

loss_magnitude:
  primary_response:
    min: 750000
    mode: 4000000
    max: 20000000
  secondary_response:
    min: 2000000
    mode: 40000000
    max: 500000000
    notes: Multi-airline disruption, possible weight-and-balance safety event, ATSB and CASA inquiry
  currency: AUD

controls_suggested:
  - id: AESCSF-MC-01
    name: Network monitoring of OT protocols on fuel systems
    framework: AESCSF
  - id: PR.AC-5
    name: Network segmentation between IT and OT for fuel systems
    framework: NIST-CSF
  - id: CIRMP-CYBER-7
    name: Two-person rule for fuel-system configuration changes
    framework: SOCI-CIRMP

references:
  - "Mabanaft / Oiltanking cyber incident, January 2022 — public reporting"
  - "IATA Fuel Quality Pool guidance"
  - "IATA Aviation Cyber Security Strategy 2.0"
  - "ACSC, Annual Cyber Threat Report 2024-25"
  - "Australian Government, Security of Critical Infrastructure Act 2018, aviation asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
