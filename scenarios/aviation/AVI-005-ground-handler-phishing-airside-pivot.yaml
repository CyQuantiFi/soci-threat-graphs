id: AVI-005
title: Ground-handler phishing leading to airside system access
version: 1.0.0
sector: aviation
soci_asset_class: aviation
classification: TLP:CLEAR

summary: >
  Spear-phishing against a contracted ground-handling provider yields
  credentials that work on the airport's airside operations systems. The
  attacker uses these to manipulate load-planning, slot allocation, or
  turnaround coordination, causing delays and unsafe-load conditions.
  Pattern reflects the airport-ecosystem multi-employer access model and
  the documented phishing rates against the AU aviation sector per ACSC.

mitre_attack:
  tactics: [TA0001, TA0008]
  techniques:
    - id: T1566.001
      name: Spearphishing Attachment
    - id: T1078
      name: Valid Accounts
    - id: T1133
      name: External Remote Services

nodes:
  - id: external_attacker
    type: external
    description: Adversary with sector reconnaissance
    scannable: true
    criticality: low

  - id: ground_handler_employee
    type: person
    description: Contracted ground-handling employee with airport-systems access
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: medium

  - id: ground_handler_endpoint
    type: it_asset
    description: Ground-handler-managed endpoint
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: medium

  - id: airport_airside_systems
    type: it_asset
    description: Airport airside operations and turnaround coordination systems
    scannable: true
    criticality: high
    consequence_type: availability

  - id: load_planning_database
    type: data_store
    description: Load and balance planning records
    scannable: true
    criticality: high
    consequence_type: integrity

edges:
  - from: external_attacker
    to: ground_handler_employee
    technique: T1566.001
    detection_difficulty: medium

  - from: ground_handler_employee
    to: ground_handler_endpoint
    technique: T1078
    detection_difficulty: medium

  - from: ground_handler_endpoint
    to: airport_airside_systems
    technique: T1133
    detection_difficulty: high

  - from: airport_airside_systems
    to: load_planning_database
    technique: T1078
    detection_difficulty: high

likelihood:
  annual_frequency:
    min: 0.05
    mode: 0.20
    max: 0.50
  rationale: >
    Phishing is the highest-volume initial-access vector and ground-handler
    populations are large and turn over quickly. Mode reflects the
    near-certainty that at least one credential-theft event affects an AU
    airport's ground-handler ecosystem per year.

loss_magnitude:
  primary_response:
    min: 250000
    mode: 1500000
    max: 8000000
  secondary_response:
    min: 500000
    mode: 10000000
    max: 150000000
    notes: Operational disruption, possible safety event from unsafe-load condition, regulator action
  currency: AUD

controls_suggested:
  - id: E8-MFA
    name: MFA on all third-party system access
    framework: Essential-Eight
  - id: PR.AC-3
    name: Remote access is managed across ground-handler ecosystem
    framework: NIST-CSF
  - id: CIRMP-PERS-1
    name: Personnel security checks extended to ground-handler ecosystem
    framework: SOCI-CIRMP

references:
  - "IATA Aviation Cyber Security Strategy 2.0"
  - "ACSC, Annual Cyber Threat Report 2024-25 — phishing"
  - "Department of Home Affairs Aviation Industry Security publications"
  - "Mandiant M-Trends 2025 — third-party initial access"
  - "Australian Government, Security of Critical Infrastructure Act 2018, aviation asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
