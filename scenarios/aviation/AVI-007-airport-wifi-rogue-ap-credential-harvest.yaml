id: AVI-007
title: Airside Wi-Fi rogue access point harvesting staff and crew credentials
version: 1.0.0
sector: aviation
soci_asset_class: aviation
classification: TLP:CLEAR

summary: >
  An attacker deploys a rogue Wi-Fi access point in or near the airside
  environment masquerading as an airport staff or crew network. Workers
  on apron or in crew rooms connect to the rogue network and have
  credentials, session tokens, and authenticator tokens stolen. The
  attacker uses these against airport operational systems. Pattern
  documented in airport-physical-security advisories and in general
  rogue-AP threat research.

mitre_attack:
  tactics: [TA0001, TA0006]
  techniques:
    - id: T1557
      name: Adversary-in-the-Middle
    - id: T1078
      name: Valid Accounts
    - id: T1539
      name: Steal Web Session Cookie

nodes:
  - id: external_attacker
    type: external
    description: Physically present adversary with portable rogue AP
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: low

  - id: airport_staff_devices
    type: it_asset
    description: Staff mobile devices and laptops in apron and crew rooms
    scannable: true
    criticality: medium

  - id: harvested_credentials
    type: data_store
    description: Credentials and session tokens collected by the rogue AP
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: high
    consequence_type: confidentiality

  - id: airport_operational_systems
    type: it_asset
    description: Airport operational systems
    scannable: true
    criticality: high
    consequence_type: confidentiality

edges:
  - from: external_attacker
    to: airport_staff_devices
    technique: T1557
    detection_difficulty: high

  - from: airport_staff_devices
    to: harvested_credentials
    technique: T1539
    detection_difficulty: very_high

  - from: harvested_credentials
    to: airport_operational_systems
    technique: T1078
    detection_difficulty: high

likelihood:
  annual_frequency:
    min: 0.005
    mode: 0.04
    max: 0.15
  rationale: >
    Rogue AP attacks at major transit hubs are documented; large airside
    workforce concentration creates the opportunity. Mode reflects the
    annualised likelihood at AU SOCI-regulated airports.

loss_magnitude:
  primary_response:
    min: 150000
    mode: 800000
    max: 4000000
  secondary_response:
    min: 500000
    mode: 8000000
    max: 100000000
    notes: Lateral compromise of airport operational systems, OAIC NDB at staff scale, regulator inquiry
  currency: AUD

controls_suggested:
  - id: E8-MFA
    name: Phishing-resistant MFA on operational systems
    framework: Essential-Eight
  - id: PR.AC-7
    name: Strong authentication on all operational systems
    framework: NIST-CSF
  - id: CIRMP-PHYS-3
    name: Wireless intrusion detection and rogue-AP sweeps in airside areas
    framework: SOCI-CIRMP

references:
  - "NIST SP 800-153 Wireless LAN Security Guidance"
  - "IATA Aviation Cyber Security Strategy 2.0"
  - "Department of Home Affairs Aviation Industry Security publications"
  - "ACSC, Annual Cyber Threat Report 2024-25"
  - "Australian Government, Security of Critical Infrastructure Act 2018, aviation asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
