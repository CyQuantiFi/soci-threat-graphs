id: AVI-003
title: Air-cargo terminal management ransomware disrupting freight handling
version: 1.0.0
sector: aviation
soci_asset_class: aviation
classification: TLP:CLEAR

summary: >
  Ransomware encrypts the cargo-management system at an airport freight
  terminal, halting documentation, customs interface, and warehouse
  movements. Perishable and time-sensitive cargo (medical, e-commerce,
  pharmaceutical) is most affected. Pattern follows DP World Australia 2023
  for the container-port equivalent and the broader pattern of cargo-
  terminal ransomware events globally.

mitre_attack:
  tactics: [TA0001, TA0008, TA0040]
  techniques:
    - id: T1566
      name: Phishing
    - id: T1486
      name: Data Encrypted for Impact
    - id: T1490
      name: Inhibit System Recovery

nodes:
  - id: external_attacker
    type: external
    description: Ransomware affiliate
    scannable: true
    criticality: low

  - id: warehouse_user_endpoint
    type: it_asset
    description: Warehouse workstation
    scannable: true
    criticality: medium

  - id: cargo_management_system
    type: it_asset
    description: Air-cargo terminal management system
    scannable: true
    criticality: critical
    consequence_type: availability

  - id: customs_interface
    type: it_asset
    description: Customs interface to ABF Integrated Cargo System
    scannable: true
    criticality: high
    consequence_type: availability

  - id: warehouse_handling_operation
    type: ot_asset
    description: Physical cargo movement, gated on system documentation
    scannable: false
    reason_unscannable: operational_disruption_risk
    criticality: critical
    consequence_type: availability

edges:
  - from: external_attacker
    to: warehouse_user_endpoint
    technique: T1566
    detection_difficulty: medium

  - from: warehouse_user_endpoint
    to: cargo_management_system
    technique: T1486
    detection_difficulty: low

  - from: cargo_management_system
    to: customs_interface
    technique: T1490
    detection_difficulty: low

  - from: cargo_management_system
    to: warehouse_handling_operation
    technique: T1490
    detection_difficulty: very_low

likelihood:
  annual_frequency:
    min: 0.02
    mode: 0.10
    max: 0.30
  rationale: >
    Air-cargo terminal ransomware is well-documented globally. Mode
    reflects AU cargo-terminal threat environment per ACSC and IATA
    publications.

loss_magnitude:
  primary_response:
    min: 500000
    mode: 3000000
    max: 15000000
  secondary_response:
    min: 1500000
    mode: 25000000
    max: 250000000
    notes: Perishable cargo losses, customer compensation, regulatory inquiry, supply-chain knock-on
  currency: AUD

controls_suggested:
  - id: E8-BACKUPS
    name: Daily backups with offline copy and tested recovery
    framework: Essential-Eight
  - id: E8-MFA
    name: MFA on cargo-system accounts
    framework: Essential-Eight
  - id: CIRMP-CYBER-9
    name: Tested business continuity plan including paper-based fallback
    framework: SOCI-CIRMP

references:
  - "IATA Cargo Cyber Security guidance"
  - "DP World Australia incident, November 2023"
  - "ACSC, Annual Cyber Threat Report 2024-25"
  - "Department of Home Affairs Maritime and Aviation Industry Security publications"
  - "Australian Government, Security of Critical Infrastructure Act 2018, aviation asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
