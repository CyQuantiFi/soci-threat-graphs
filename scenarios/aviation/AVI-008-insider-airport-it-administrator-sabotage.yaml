id: AVI-008
title: Insider airport IT administrator sabotage of common-use systems
version: 1.0.0
sector: aviation
soci_asset_class: aviation
classification: TLP:CLEAR

summary: >
  A current or recently-departed airport IT administrator with retained
  privileged access either intentionally damages the common-use platform,
  changes configurations causing later outages, or exfiltrates sensitive
  data. Insider sabotage scenarios are well documented in CERT Insider
  Threat Center publications and the typical aviation-IT environment has
  many privileged users.

mitre_attack:
  tactics: [TA0008, TA0040]
  techniques:
    - id: T1078
      name: Valid Accounts
    - id: T1485
      name: Data Destruction
    - id: T1561
      name: Disk Wipe

nodes:
  - id: insider_administrator
    type: person
    description: Current or recently-departed privileged IT administrator
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: high

  - id: shared_airport_it_admin
    type: it_asset
    description: Admin plane of shared airport IT
    scannable: true
    criticality: critical

  - id: common_use_platform
    type: it_asset
    description: Common-use passenger-processing platform
    scannable: true
    criticality: critical
    consequence_type: availability

  - id: airport_corporate_data
    type: data_store
    description: Airport corporate data including financial and contractual records
    scannable: true
    criticality: high
    consequence_type: confidentiality

edges:
  - from: insider_administrator
    to: shared_airport_it_admin
    technique: T1078
    detection_difficulty: very_high
    notes: Retained credentials or back-door account

  - from: shared_airport_it_admin
    to: common_use_platform
    technique: T1485
    detection_difficulty: high

  - from: shared_airport_it_admin
    to: airport_corporate_data
    technique: T1561
    detection_difficulty: high

likelihood:
  annual_frequency:
    min: 0.001
    mode: 0.015
    max: 0.06
  rationale: >
    Insider sabotage is rare per disclosed AU aviation incidents but
    consequence is significant. Mode reflects CERT Insider Threat Center
    statistics on technical-insider sabotage rates.

loss_magnitude:
  primary_response:
    min: 500000
    mode: 3000000
    max: 15000000
  secondary_response:
    min: 1500000
    mode: 25000000
    max: 300000000
    notes: Multi-airline impact, criminal investigation, brand damage, possible CASA inquiry on aviation security
  currency: AUD

controls_suggested:
  - id: PR.AC-4
    name: Access permissions managed; immediate revocation on departure
    framework: NIST-CSF
  - id: CIRMP-PERS-2
    name: Privileged-account governance with two-person sensitive change approval
    framework: SOCI-CIRMP
  - id: AESCSF-AC-06
    name: User-activity monitoring on privileged accounts
    framework: AESCSF

references:
  - "Carnegie Mellon CERT Insider Threat Center publications"
  - "ENISA Insider Threat Landscape 2023"
  - "ACSC, Annual Cyber Threat Report 2024-25 — insider threat"
  - "Department of Home Affairs Aviation Industry Security publications"
  - "Australian Government, Security of Critical Infrastructure Act 2018, aviation asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
