id: ELE-004
title: Industroyer-pattern protocol abuse against transmission substations
version: 1.0.0
sector: electricity
soci_asset_class: electricity
classification: TLP:CLEAR

summary: >
  A capable state or state-aligned actor delivers malware that speaks ICS
  protocols (IEC 60870-5-101/104, IEC 61850, DNP3) natively to issue
  unauthorised open commands to transmission-substation breakers, replicating
  the publicly documented Industroyer (2016) and Industroyer2 (2022) attacks
  on Ukrainian grid operators. Consequence is supply loss measured in
  hundreds of MW for the duration of restoration.

mitre_attack:
  tactics: [TA0001, TA0040]
  techniques:
    - id: T1190
      name: Exploit Public-Facing Application
    - id: T0855
      name: Unauthorized Command Message
    - id: T0831
      name: Manipulation of Control

nodes:
  - id: state_actor
    type: external
    description: State or state-aligned actor with ICS-protocol capability
    scannable: true
    criticality: low

  - id: corporate_network
    type: it_asset
    description: Corporate IT network of the transmission operator
    scannable: true
    criticality: high

  - id: control_centre_ot_dmz
    type: it_asset
    description: OT DMZ bridging corporate to substation networks
    scannable: true
    criticality: critical

  - id: substation_gateway
    type: ot_asset
    description: Substation gateway speaking IEC 60870-5-104 and IEC 61850
    scannable: false
    reason_unscannable: vendor_support_prohibits_agents
    criticality: critical
    consequence_type: availability

  - id: protection_relay
    type: ot_asset
    description: Protection relay controlling a transmission breaker
    scannable: false
    reason_unscannable: safety_critical_air_gapped
    criticality: critical
    consequence_type: physical_safety

edges:
  - from: state_actor
    to: corporate_network
    technique: T1190
    detection_difficulty: high
    notes: Long-dwell intrusion typical of state actors

  - from: corporate_network
    to: control_centre_ot_dmz
    technique: T1190
    detection_difficulty: high

  - from: control_centre_ot_dmz
    to: substation_gateway
    technique: T0855
    detection_difficulty: very_high
    notes: ICS-protocol-native command, indistinguishable from legitimate operator traffic

  - from: substation_gateway
    to: protection_relay
    technique: T0831
    detection_difficulty: very_high

likelihood:
  annual_frequency:
    min: 0.0002
    mode: 0.003
    max: 0.02
  rationale: >
    Capability and intent ceiling limit this to state actors targeting AU
    in a tense geopolitical context. Mode reflects increasing public
    attribution of ICS-targeting state operations since 2022 against the
    base rate of disclosed AU transmission incidents.

loss_magnitude:
  primary_response:
    min: 2000000
    mode: 12000000
    max: 80000000
  secondary_response:
    min: 10000000
    mode: 200000000
    max: 5000000000
    notes: Wide-area outage, NEM market impact, customer compensation, business interruption, possible loss of life with associated coronial inquiry, national-security inquiry
  currency: AUD

controls_suggested:
  - id: AESCSF-MC-01
    name: Network monitoring of OT protocols for anomalous commands
    framework: AESCSF
  - id: PR.PT-1
    name: Audit log records determined, documented, implemented, and reviewed
    framework: NIST-CSF
  - id: CIRMP-CYBER-7
    name: Two-person rule for safety-critical breaker operations
    framework: SOCI-CIRMP

references:
  - "Industroyer / CrashOverride malware analysis — ESET, Dragos 2017"
  - "Industroyer2 / Ukraine 2022 grid attack — ESET, CERT-UA"
  - "CISA advisory AA22-103A: APT cyber tools targeting ICS/SCADA devices"
  - "AESCSF v1, AEMO"
  - "Australian Government, Security of Critical Infrastructure Act 2018, electricity asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
