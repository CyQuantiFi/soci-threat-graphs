id: ELE-005
title: Cloud-hosted renewable-inverter management platform compromised at scale
version: 1.0.0
sector: electricity
soci_asset_class: electricity
classification: TLP:CLEAR

summary: >
  An attacker compromises the cloud-hosted management platform used by a
  large-inverter or VPP aggregator to control distributed solar, wind, or
  battery assets. Adversary commands inverters to switch off or to inject
  reactive power outside normal operating envelopes, with stability
  implications for the local distribution network. Pattern anchored to
  AEMO and ENA research on cyber risks to consumer energy resources and
  to disclosed vulnerabilities in inverter cloud platforms 2022-2025.

mitre_attack:
  tactics: [TA0001, TA0040]
  techniques:
    - id: T1190
      name: Exploit Public-Facing Application
    - id: T0855
      name: Unauthorized Command Message
    - id: T0831
      name: Manipulation of Control

nodes:
  - id: external_attacker
    type: external
    description: Capable adversary targeting renewables management
    scannable: true
    criticality: low

  - id: inverter_cloud_platform
    type: vendor_asset
    description: Cloud-hosted inverter management platform
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: critical
    consequence_type: availability

  - id: inverter_population
    type: iot_asset
    description: Residential and commercial inverters under management
    scannable: false
    reason_unscannable: embedded_constrained_device
    criticality: high
    consequence_type: availability

  - id: distribution_feeder
    type: ot_asset
    description: Distribution feeder receiving aggregated inverter output
    scannable: false
    reason_unscannable: safety_critical_air_gapped
    criticality: high
    consequence_type: availability

edges:
  - from: external_attacker
    to: inverter_cloud_platform
    technique: T1190
    detection_difficulty: medium

  - from: inverter_cloud_platform
    to: inverter_population
    technique: T0855
    detection_difficulty: very_high
    notes: Commands appear legitimate; protocol authentication often vendor-specific and weak

  - from: inverter_population
    to: distribution_feeder
    technique: T0831
    detection_difficulty: high
    notes: Aggregate effect of population-scale switching

likelihood:
  annual_frequency:
    min: 0.001
    mode: 0.02
    max: 0.10
  rationale: >
    Disclosed vulnerabilities in inverter cloud platforms have appeared
    repeatedly 2022-2025. Mode reflects the likelihood of an exploitable
    issue being weaponised against an AU aggregator in a 12-month window;
    consequence severity rises with adoption of consumer energy resources.

loss_magnitude:
  primary_response:
    min: 500000
    mode: 3000000
    max: 15000000
  secondary_response:
    min: 1500000
    mode: 25000000
    max: 200000000
    notes: NEM market impact, AER and ESC inquiry, customer trust impact on residential solar adoption
  currency: AUD

controls_suggested:
  - id: CIRMP-CYBER-12
    name: Vendor cloud-platform security assessment
    framework: SOCI-CIRMP
  - id: AESCSF-DER-01
    name: Distributed energy resource cyber controls per ENA and AEMO guidance
    framework: AESCSF
  - id: PR.AC-7
    name: Strong authentication on inverter management plane
    framework: NIST-CSF

references:
  - "AEMO and Energy Networks Australia, DER cyber security research papers"
  - "Department of Climate Change, Energy, the Environment and Water — DER security work program"
  - "CISA advisories on solar-inverter and inverter-management platform vulnerabilities 2022-2025"
  - "ENISA Threat Landscape for the Energy Sector"
  - "Australian Government, Security of Critical Infrastructure Act 2018, electricity asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
