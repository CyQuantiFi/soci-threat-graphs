id: WAT-009
title: Customer portal credential stuffing causing mass PII disclosure
version: 1.0.0
sector: water
soci_asset_class: water_and_sewerage
classification: TLP:CLEAR

summary: >
  An attacker uses credentials from unrelated breaches to access the utility's
  online customer portal at scale. Successful logins disclose customer names,
  addresses, payment details, hardship-program participation, and consumption
  patterns that can be combined with other data sources for downstream fraud.
  No OT impact, but a notifiable data-breach event under the Privacy Act 1988
  and reputational and legal exposure. Anchored to the documented use of
  credential-stuffing against AU online services 2022-2025 and the OAIC's
  consistent ranking of credential stuffing in NDB statistics.

mitre_attack:
  tactics: [TA0001, TA0009]
  techniques:
    - id: T1110
      name: Brute Force
    - id: T1078
      name: Valid Accounts
    - id: T1530
      name: Data from Cloud Storage

nodes:
  - id: external_attacker
    type: external
    description: Adversary armed with credential lists from prior breaches
    scannable: true
    criticality: low

  - id: customer_portal_web
    type: it_asset
    description: Public customer self-service portal
    scannable: true
    criticality: high
    consequence_type: confidentiality

  - id: customer_portal_api
    type: it_asset
    description: API backend of customer portal
    scannable: true
    criticality: high

  - id: customer_pii_database
    type: data_store
    description: Customer PII database (names, addresses, payment details, hardship data)
    scannable: true
    criticality: critical
    consequence_type: confidentiality

edges:
  - from: external_attacker
    to: customer_portal_web
    technique: T1110
    detection_difficulty: low
    notes: High-volume credential stuffing, throttling and CAPTCHA often absent or weak

  - from: external_attacker
    to: customer_portal_api
    technique: T1078
    detection_difficulty: medium
    notes: Successful logins; account-takeover at scale

  - from: customer_portal_api
    to: customer_pii_database
    technique: T1530
    detection_difficulty: high
    notes: Enumeration via account features; access to per-account PII

likelihood:
  annual_frequency:
    min: 0.10
    mode: 0.30
    max: 0.70
  rationale: >
    Credential stuffing against AU online services is near-continuous per
    OAIC NDB and Have I Been Pwned data. Mode reflects the likelihood that
    any given AU water utility's portal experiences a successful at-scale
    event in a 12-month window.

loss_magnitude:
  primary_response:
    min: 100000
    mode: 600000
    max: 4000000
  secondary_response:
    min: 500000
    mode: 5000000
    max: 80000000
    notes: OAIC NDB notification, customer credit monitoring, class action exposure under recent Privacy Act amendments, brand damage
  currency: AUD

controls_suggested:
  - id: E8-MFA
    name: MFA on customer-portal logins
    framework: Essential-Eight
  - id: PR.AC-7
    name: Users, devices, and assets are authenticated commensurate with risk
    framework: NIST-CSF
  - id: CIRMP-CYBER-10
    name: Customer-portal abuse monitoring and rate limiting
    framework: SOCI-CIRMP

references:
  - "OAIC Notifiable Data Breaches reports 2022 H1 through 2025 H2 — credential stuffing"
  - "Have I Been Pwned aggregate data on AU breach exposure"
  - "OWASP Credential Stuffing Prevention Cheat Sheet"
  - "Privacy Act 1988 (Cth) and 2024-2025 amendments on data-breach penalties"
  - "Australian Government, Security of Critical Infrastructure Act 2018, water and sewerage asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
