id: WAT-004
title: Insider operator abusing legitimate SCADA credentials to manipulate treatment
version: 1.0.0
sector: water
soci_asset_class: water_and_sewerage
classification: TLP:CLEAR

summary: >
  A current or recently-departed control engineer with legitimate SCADA access
  uses their credentials to alter chemical dosing, pump scheduling, or alarm
  thresholds, either maliciously or as a coercion victim. Loss event is
  amplified because the access is authorised and bypasses perimeter controls.
  Anchored to the documented pattern of insider events in critical
  infrastructure including the 2000 Maroochy Shire wastewater incident in
  Queensland — still the most-cited case of insider-attributed ICS sabotage
  in the academic literature.

mitre_attack:
  tactics: [TA0001, TA0040]
  techniques:
    - id: T1078
      name: Valid Accounts
    - id: T0859
      name: Valid Accounts (ICS)
    - id: T0831
      name: Manipulation of Control

nodes:
  - id: insider_engineer
    type: person
    description: Current or recently-departed control engineer with legitimate access
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: high

  - id: scada_workstation
    type: ot_asset
    description: Engineering workstation with HMI and PLC programming software
    scannable: false
    reason_unscannable: vendor_support_prohibits_agents
    criticality: high

  - id: plc_treatment
    type: ot_asset
    description: PLC at treatment plant controlling dosing or sequencing
    scannable: false
    reason_unscannable: safety_critical_air_gapped
    criticality: critical
    consequence_type: physical_safety

  - id: alarm_management_system
    type: ot_asset
    description: Alarm aggregation system; insider can silence or reroute alarms
    scannable: false
    reason_unscannable: operational_disruption_risk
    criticality: high
    consequence_type: integrity

edges:
  - from: insider_engineer
    to: scada_workstation
    technique: T1078
    detection_difficulty: very_high
    notes: Authenticated access from authorised workstation — no anomaly to detect

  - from: scada_workstation
    to: plc_treatment
    technique: T0831
    detection_difficulty: high

  - from: scada_workstation
    to: alarm_management_system
    technique: T0859
    detection_difficulty: very_high
    notes: Insider can silence alarms before manipulating process

likelihood:
  annual_frequency:
    min: 0.001
    mode: 0.015
    max: 0.06
  rationale: >
    Insider events are rare per disclosed incident base but the consequence
    severity is high. Mode reflects ENISA Insider Threat Landscape estimates
    normalised against the SOCI water population and accounts for the typical
    20-30% of disclosed CI incidents that have an insider component.

loss_magnitude:
  primary_response:
    min: 300000
    mode: 2000000
    max: 12000000
  secondary_response:
    min: 1000000
    mode: 15000000
    max: 150000000
    notes: Public health notification, criminal investigation, regulator action, loss of community trust
  currency: AUD

controls_suggested:
  - id: PR.AC-4
    name: Access permissions managed with least privilege and separation of duties
    framework: NIST-CSF
  - id: CIRMP-PERS-2
    name: Two-person rule for safety-critical OT changes
    framework: SOCI-CIRMP
  - id: PR.AT-2
    name: Privileged users understand their roles and responsibilities
    framework: NIST-CSF
  - id: AESCSF-AC-06
    name: User-activity monitoring on OT engineering workstations
    framework: AESCSF

references:
  - "Maroochy Shire wastewater incident, Queensland 2000 — Australian Institute of Criminology case study"
  - "ENISA Insider Threat Landscape, 2023 edition"
  - "ASD/ACSC, Annual Cyber Threat Report 2024-25 — insider threats"
  - "Carnegie Mellon CERT Insider Threat Center publications"
  - "Australian Government, Security of Critical Infrastructure Act 2018, water and sewerage asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
