id: WAT-005
title: Supply-chain compromise of laboratory information system vendor
version: 1.0.0
sector: water
soci_asset_class: water_and_sewerage
classification: TLP:CLEAR

summary: >
  An attacker compromises the supply chain of a Laboratory Information
  Management System (LIMS) vendor commonly used by AU water utilities to
  record and certify drinking-water quality test results. Tampered LIMS data
  could either falsify a clean test (allowing contaminated water to be
  released to supply) or generate false positives (forcing unnecessary
  boil-water notifications). Pattern consistent with SolarWinds 2020 and
  3CX 2023 supply-chain compromises adapted to the laboratory-systems space.

mitre_attack:
  tactics: [TA0001, TA0003, TA0040]
  techniques:
    - id: T1195
      name: Supply Chain Compromise
    - id: T1554
      name: Compromise Client Software Binary
    - id: T1565
      name: Data Manipulation

nodes:
  - id: external_attacker
    type: external
    description: Capable adversary targeting a software supply chain
    scannable: true
    criticality: low

  - id: lims_vendor_build
    type: vendor_asset
    description: LIMS vendor's build and release infrastructure
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: high

  - id: signed_lims_update
    type: vendor_asset
    description: Code-signed software update delivered to all customers via auto-update
    scannable: false
    reason_unscannable: third_party_no_access
    criticality: high

  - id: utility_lims_server
    type: it_asset
    description: On-premise LIMS server at the AU water utility
    scannable: true
    criticality: high
    consequence_type: integrity

  - id: water_quality_records
    type: data_store
    description: Drinking-water quality test results, statutory reporting basis
    scannable: true
    criticality: critical
    consequence_type: integrity

edges:
  - from: external_attacker
    to: lims_vendor_build
    technique: T1195
    detection_difficulty: very_high
    notes: Vendor environment compromise; pattern of SolarWinds, 3CX

  - from: lims_vendor_build
    to: signed_lims_update
    technique: T1554
    detection_difficulty: very_high

  - from: signed_lims_update
    to: utility_lims_server
    technique: T1195
    detection_difficulty: very_high
    notes: Trusted auto-update delivers the tampered binary

  - from: utility_lims_server
    to: water_quality_records
    technique: T1565
    detection_difficulty: very_high
    notes: Subtle alteration of recorded sample results

likelihood:
  annual_frequency:
    min: 0.0005
    mode: 0.008
    max: 0.04
  rationale: >
    Software supply-chain compromise is rare per individual operator but
    catastrophic in scope when it occurs. Mode reflects the post-SolarWinds
    elevated background rate per ENISA Threat Landscape and the small number
    of LIMS vendors serving the AU water market.

loss_magnitude:
  primary_response:
    min: 500000
    mode: 3000000
    max: 15000000
  secondary_response:
    min: 2000000
    mode: 25000000
    max: 200000000
    notes: Loss of public trust in water quality data, NHMRC drinking-water guideline non-compliance, regulator action, possible historical-results re-verification programme
  currency: AUD

controls_suggested:
  - id: PR.IP-2
    name: System Development Life Cycle to manage systems implemented
    framework: NIST-CSF
  - id: CIRMP-CYBER-12
    name: Vendor supply-chain risk assessment and monitoring
    framework: SOCI-CIRMP
  - id: PR.DS-6
    name: Integrity checking mechanisms to verify software integrity
    framework: NIST-CSF

references:
  - "SolarWinds Orion supply-chain compromise, 2020 — CISA, FireEye/Mandiant analyses"
  - "3CX Desktop App supply-chain compromise, 2023 — Mandiant, CrowdStrike analyses"
  - "ENISA Threat Landscape: Supply Chain Attacks, latest edition"
  - "NHMRC Australian Drinking Water Guidelines"
  - "Australian Government, Security of Critical Infrastructure Act 2018, water and sewerage asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
