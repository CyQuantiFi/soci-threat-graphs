id: GAS-008
title: Wiper malware destroying control-room historian and engineering data
version: 1.0.0
sector: gas
soci_asset_class: gas
classification: TLP:CLEAR

summary: >
  Destructive wiper malware is deployed in the control room and destroys
  the data historian, engineering documentation, configuration backups,
  and operator workstations. OT control continues but the operator loses
  the ability to investigate the event, demonstrate operating envelopes
  to the regulator, or restore systems quickly. Reflects the documented
  use of wiper malware against critical infrastructure since the Shamoon
  attacks 2012-2017 and ongoing activity by destructive-malware-capable
  state actors.

mitre_attack:
  tactics: [TA0001, TA0040]
  techniques:
    - id: T1078
      name: Valid Accounts
    - id: T1561
      name: Disk Wipe
    - id: T1485
      name: Data Destruction

nodes:
  - id: state_actor
    type: external
    description: State-aligned actor with destructive-malware capability
    scannable: true
    criticality: low

  - id: corporate_active_directory
    type: it_asset
    description: AD used to push wiper to multiple endpoints
    scannable: true
    criticality: critical

  - id: control_room_workstations
    type: it_asset
    description: Operator workstations in the control room
    scannable: true
    criticality: high
    consequence_type: availability

  - id: data_historian
    type: data_store
    description: OT data historian
    scannable: true
    criticality: critical
    consequence_type: availability

  - id: engineering_documentation
    type: data_store
    description: Engineering documentation, drawings, configuration backups
    scannable: true
    criticality: critical
    consequence_type: availability

edges:
  - from: state_actor
    to: corporate_active_directory
    technique: T1078
    detection_difficulty: high

  - from: corporate_active_directory
    to: control_room_workstations
    technique: T1561
    detection_difficulty: low

  - from: corporate_active_directory
    to: data_historian
    technique: T1485
    detection_difficulty: low

  - from: corporate_active_directory
    to: engineering_documentation
    technique: T1485
    detection_difficulty: low

likelihood:
  annual_frequency:
    min: 0.0005
    mode: 0.008
    max: 0.04
  rationale: >
    Very low base rate per AU disclosed incidents; capability and intent
    require state alignment or sophisticated cyber-criminal actor with
    political motive. Mode reflects post-2022 elevated wiper-actor
    activity in CI sectors per CISA and ENISA reports.

loss_magnitude:
  primary_response:
    min: 1500000
    mode: 8000000
    max: 50000000
  secondary_response:
    min: 5000000
    mode: 80000000
    max: 1500000000
    notes: Multi-month restoration, loss of operational data limiting investigations, regulator inquiry, brand damage
  currency: AUD

controls_suggested:
  - id: E8-BACKUPS
    name: Daily backups with offline copy and tested recovery
    framework: Essential-Eight
  - id: CIRMP-CYBER-9
    name: Tested incident response and business continuity plan
    framework: SOCI-CIRMP
  - id: PR.IP-4
    name: Backups conducted, maintained, and tested
    framework: NIST-CSF

references:
  - "Shamoon, Shamoon 2 malware analyses, 2012-2017"
  - "WhisperGate and HermeticWiper malware against Ukraine, 2022"
  - "CISA advisories on destructive malware"
  - "ACSC, Annual Cyber Threat Report 2024-25"
  - "Australian Government, Security of Critical Infrastructure Act 2018, gas asset class"

maintainers:
