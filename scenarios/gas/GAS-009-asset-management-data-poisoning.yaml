id: GAS-009
title: Asset-management data poisoning misdirecting integrity-management programme
version: 1.0.0
sector: gas
soci_asset_class: gas
classification: TLP:CLEAR

summary: >
  An attacker quietly tampers with the gas operator's pipeline asset-
  management and integrity-management database, altering inline-inspection
  results, anomaly classifications, or remaining-life calculations. The
  operator's integrity-management programme — required under AS 2885 —
  proceeds based on falsified data, missing real defects until they fail
  in service. A long-dwell tampering scenario consistent with state-actor
  patience and Dragos's documented industrial-data-targeting tooling.

mitre_attack:
  tactics: [TA0001, TA0040]
  techniques:
    - id: T1078
      name: Valid Accounts
    - id: T1565
      name: Data Manipulation
    - id: T1485
      name: Data Destruction

nodes:
  - id: external_attacker
    type: external
    description: Patient adversary, possibly state-aligned
    scannable: true
    criticality: low

  - id: integrity_management_database
    type: data_store
    description: Pipeline integrity-management database
    scannable: true
    criticality: critical
    consequence_type: integrity

  - id: inline_inspection_data_archive
    type: data_store
    description: Inline-inspection (smart pig) results archive
    scannable: true
    criticality: critical
    consequence_type: integrity

  - id: integrity_engineer_workstation
    type: it_asset
    description: Engineering workstation consuming and updating integrity data
    scannable: true
    criticality: high

  - id: pipeline_asset
    type: ot_asset
    description: Buried pipeline asset relying on integrity programme for safety
    scannable: false
    reason_unscannable: operational_disruption_risk
    criticality: critical
    consequence_type: physical_safety

edges:
  - from: external_attacker
    to: integrity_engineer_workstation
    technique: T1078
    detection_difficulty: high

  - from: integrity_engineer_workstation
    to: integrity_management_database
    technique: T1565
    detection_difficulty: very_high
    notes: Long-dwell subtle tampering below review thresholds

  - from: integrity_engineer_workstation
    to: inline_inspection_data_archive
    technique: T1485
    detection_difficulty: very_high

  - from: integrity_management_database
    to: pipeline_asset
    technique: T1565
    detection_difficulty: very_high
    notes: Falsified data drives integrity decisions; real defects missed

likelihood:
  annual_frequency:
    min: 0.0001
    mode: 0.003
    max: 0.02
  rationale: >
    Very low base rate per disclosed incidents but consequence severity
    accumulates over years. Mode reflects post-2022 increase in long-dwell
    state-actor activity in CI sectors per CISA, Dragos, and ACSC reports.

loss_magnitude:
  primary_response:
    min: 1000000
    mode: 5000000
    max: 30000000
  secondary_response:
    min: 5000000
    mode: 100000000
    max: 3000000000
    notes: Eventual rupture event, environmental remediation, possible loss of life, regulator and coronial inquiries, asset replacement
  currency: AUD

controls_suggested:
  - id: PR.DS-6
    name: Integrity checking mechanisms with cryptographic signing on integrity data
    framework: NIST-CSF
  - id: CIRMP-CYBER-7
    name: Two-person rule for integrity-management data changes
    framework: SOCI-CIRMP
  - id: AS-2885
    name: AS 2885 series — pipelines, gas and liquid petroleum

references:
  - "AS/NZS 2885 series on gas pipeline integrity"
  - "Dragos OT Cybersecurity Year in Review 2024-2025 — long-dwell intrusions"
  - "Australian Pipelines and Gas Association integrity-management guidance"
  - "CISA advisories on long-dwell ICS intrusions"
  - "Australian Government, Security of Critical Infrastructure Act 2018, gas asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
