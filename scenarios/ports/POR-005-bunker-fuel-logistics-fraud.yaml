id: POR-005
title: Bunker-fuel logistics system compromise enabling fuel-quantity fraud
version: 1.0.0
sector: ports
soci_asset_class: ports
classification: TLP:CLEAR

summary: >
  An attacker compromises the operator's bunker-fuel logistics and metering
  system to either falsify delivered-fuel quantities (defrauding shippers
  or operators) or to disrupt fuel supply to bunkering vessels. Targets
  the well-documented weakness of OT-protocol-speaking custody-transfer
  systems and ENISA-flagged maritime fuel logistics risk.

mitre_attack:
  tactics: [TA0001, TA0040]
  techniques:
    - id: T1078
      name: Valid Accounts
    - id: T1565
      name: Data Manipulation
    - id: T0836
      name: Modify Parameter

nodes:
  - id: organised_crime
    type: external
    description: Cyber-enabled fuel-fraud actor
    scannable: true
    criticality: low

  - id: bunker_logistics_system
    type: it_asset
    description: Bunkering logistics and scheduling system
    scannable: true
    criticality: high
    consequence_type: integrity

  - id: fuel_metering_supervisory
    type: ot_asset
    description: Supervisory station for fuel-transfer metering
    scannable: false
    reason_unscannable: vendor_support_prohibits_agents
    criticality: high

  - id: fuel_custody_transfer_meter
    type: ot_asset
    description: Custody-transfer fuel meter
    scannable: false
    reason_unscannable: embedded_constrained_device
    criticality: critical
    consequence_type: integrity

edges:
  - from: organised_crime
    to: bunker_logistics_system
    technique: T1078
    detection_difficulty: medium

  - from: bunker_logistics_system
    to: fuel_metering_supervisory
    technique: T1565
    detection_difficulty: high

  - from: fuel_metering_supervisory
    to: fuel_custody_transfer_meter
    technique: T0836
    detection_difficulty: very_high

likelihood:
  annual_frequency:
    min: 0.001
    mode: 0.012
    max: 0.06
  rationale: >
    Bunker fraud has clear precedent in the maritime fuel supply chain;
    cyber-enabled fraud raises consequence and scale.

loss_magnitude:
  primary_response:
    min: 200000
    mode: 1200000
    max: 6000000
  secondary_response:
    min: 1000000
    mode: 15000000
    max: 150000000
    notes: Direct fraud loss, possible AFP and AMSA investigation, shipper contract disputes
  currency: AUD

controls_suggested:
  - id: PR.DS-6
    name: Integrity checking on bunker-metering data
    framework: NIST-CSF
  - id: CIRMP-CYBER-7
    name: Two-person rule for bunker-meter configuration changes
    framework: SOCI-CIRMP
  - id: AESCSF-AC-06
    name: User-activity monitoring on metering supervisory stations
    framework: AESCSF

references:
  - "ENISA Port Cybersecurity, latest edition"
  - "AMSA bunker-fuel quality and quantity guidance"
  - "BIMCO Guidelines on Cyber Security Onboard Ships"
  - "ASD/ACSC, Annual Cyber Threat Report 2024-25 — financial crime"
  - "Australian Government, Security of Critical Infrastructure Act 2018, ports asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
