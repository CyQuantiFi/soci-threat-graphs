id: POR-009
title: Port Community System compromise affecting multiple stakeholders
version: 1.0.0
sector: ports
soci_asset_class: ports
classification: TLP:CLEAR

summary: >
  An attacker compromises a Port Community System (PCS) — the shared data
  exchange platform between port operators, shipping lines, freight
  forwarders, customs, and other stakeholders. PCS compromise cascades
  across many ecosystem participants simultaneously and causes downstream
  loss disproportionate to a single-operator event. Anchored to ENISA
  Port Community System cyber guidance and the documented PCS exposure
  at multiple international ports.

mitre_attack:
  tactics: [TA0001, TA0040]
  techniques:
    - id: T1190
      name: Exploit Public-Facing Application
    - id: T1486
      name: Data Encrypted for Impact
    - id: T1565
      name: Data Manipulation

nodes:
  - id: external_attacker
    type: external
    description: Ransomware or state-aligned actor
    scannable: true
    criticality: low

  - id: pcs_web_portal
    type: it_asset
    description: PCS web portal used by all stakeholders
    scannable: true
    criticality: critical
    consequence_type: availability

  - id: pcs_data_exchange_backend
    type: it_asset
    description: PCS data-exchange backend bridging stakeholder systems
    scannable: true
    criticality: critical
    consequence_type: integrity

  - id: stakeholder_ecosystem
    type: external
    description: Shipping lines, freight forwarders, customs, terminal operators
    scannable: true
    criticality: high
    consequence_type: availability

edges:
  - from: external_attacker
    to: pcs_web_portal
    technique: T1190
    detection_difficulty: medium

  - from: pcs_web_portal
    to: pcs_data_exchange_backend
    technique: T1486
    detection_difficulty: low

  - from: pcs_data_exchange_backend
    to: stakeholder_ecosystem
    technique: T1565
    detection_difficulty: medium
    notes: Cascading impact across many ecosystem participants

likelihood:
  annual_frequency:
    min: 0.005
    mode: 0.04
    max: 0.18
  rationale: >
    PCS platforms are concentration points and have been targeted in
    international maritime incidents 2022-2025. Mode reflects the
    likelihood that AU PCS operators experience a material event.

loss_magnitude:
  primary_response:
    min: 1000000
    mode: 5000000
    max: 30000000
  secondary_response:
    min: 5000000
    mode: 80000000
    max: 1000000000
    notes: Multi-stakeholder cascade including shipping line and freight forwarder claims; ABF and AMSA inquiry; possible Privacy Act exposure
  currency: AUD

controls_suggested:
  - id: CIRMP-CYBER-12
    name: PCS provider governance and continuous monitoring
    framework: SOCI-CIRMP
  - id: PR.AC-3
    name: Remote access is managed across stakeholder connections
    framework: NIST-CSF
  - id: PR.IP-4
    name: Backups conducted, maintained, and tested
    framework: NIST-CSF

references:
  - "ENISA Port Cybersecurity — Port Community Systems"
  - "BIMCO Guidelines on Cyber Security Onboard Ships"
  - "Department of Home Affairs Maritime Industry Security publications"
  - "ACSC, Annual Cyber Threat Report 2024-25 — transport sector"
  - "Australian Government, Security of Critical Infrastructure Act 2018, ports asset class"

maintainers:
  - "@cyquantifi"
contributors: []
last_reviewed: "2026-06-30"
license: MIT
